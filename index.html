<head>
  <style>
  body{ background-color: lightblue;
  transition: 1s;}
    .on-green {background-color:lightgreen;}
    .on-pink{background-color: pink;}
    .on-yellow{background-color: lightyellow;}
    button{background-color: yellow;
    padding: 15px 15px;
    border: solid black;
    border-radius: 5px;
    color:coral;
    cursor: pointer;
    animation:bounce 0.8s infinite ease-in-out;}
    @keyframes bounce {0%, 100% {transform: translateY(0);}
    50%{transform: translateY(10px);}
    }
    div{background-color:red;
    color: white;
    width: 100px;
    height: 100px;
    border-radius:50%;
    display: flex;
    justify-content: center;
    align-items: center;
    animation: pulse 1s infinite ease-in-out;
    }
    @keyframes pulse {0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform: scale(1);}}
    h1{text-align: center;}
    h2{text-align: center;}
  </style>
  <body>
    <h1>hello this is my test page</h1>
    <button id="switching"
    onclick="switching()">Click</button>
    <h2 id="tread"> tread this</h2>
    <div>Try button</div>
    
  </body>
  <script>
    let clicks=0;
     function switching(){
       clicks++;
      if (clicks == 1){
      document.body.style.backgroundColor="pink";
      document.getElementById("tread").innerText="more"}
      else if (clicks == 2){
        document.body.style.backgroundColor="lightgreen";
        document.getElementById("tread").innerText="Why"}
        else if (clicks == 3){
          document.body.style.backgroundColor = "lightyellow";
          document.getElementById("tread").innerText="One time more"
        }
        else if (clicks == 4){
      document.getElementById("tread").innerText="Good job"
      document.body.style.backgroundColor ="lightblue"
      clicks =0;}
     }
      
    
  </script>
  
</head>
