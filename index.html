<head>
  <style>
  body{ background-color: lightblue;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content:center ;
  margin:0 ;
  height: 100vh;
  transition: 1s;}
    .on-green {background-color:lightgreen;}
    .on-pink{background-color: pink;}
    .on-yellow{background-color: lightyellow; }
    button{background-color: violet;
    padding: 10px 20px;
    border: solid black;

    color:yellow;
    position: absolute;
    right:20px;
    cursor: pointer;
    display: inline-block;-webkit-animation: shake 0.3s linear infinite;
    animation: shake 0.3s linear infinite;}
    @-webkit-keyframes shake{0%{-webkit-transform: translate(0, 0);}
    20%{-webkit-transform: translate(-5px, 2px)}
    40%{-webkit-transform: translate(5px, -2px);}
    60%{-webkit-transform: translate(-5px, 2px);}
    80%{-webkit-transform: translate(5px, -2px);}
    100%{-webkit-transform: translate(-5px, 2px):}
    @keyframes shake {0%{transform: translate (0, 0);}
    10%{transform: translate (-5px, 2px);}
    20%{transform: translate (5px, -2px);}
    30%{transform: translate (-5px, 2px);}
    40%{transform: translate (5px, -2px);}
    50%{transform: translate (-5px, 2px);}
    60%{transform: translate (5px, -2px);}
    70%{transform: translate (-5px, 2px);}
    80%{transform: translate (5px, -2px);}
    90%{transform: translate (-5px, 2px);}
    100%{transform: translate (0, 0);}}}
    div{background-color:red;
    color: white;

    top:100px;
    left:20px;

    }
    @keyframes pulse-and-move {0%{transform:scale(1) translate (0,0);}

      }

      text-align: center;}

  <body>
    <h1>hello this is my test page</h1>
    <button id="switching"
    onclick="switching()" >Click me</button>
    <h2 id="tread"> tread this</h2>
    <div>Try button</div>
    <span id="cliking">0</span>
    
  </body>
  <script>
    let clicks=0;
    let cliking=0;
     function switching(){
       cliking++;
       clicks++;
      if (clicks == 1){
      document.body.style.backgroundColor="pink";
      document.getElementById("tread").innerText="more"}
      else if (clicks == 2){
        document.body.style.backgroundColor="lightgreen";
        document.getElementById("tread").innerText="Why"}
        else if (clicks == 3){
          document.body.style.backgroundColor = "lightyellow";
          document.getElementById("tread").innerText="One time more"
        }
        else if (clicks == 4){
      document.getElementById("tread").innerText="tread this"
      document.body.style.backgroundColor ="lightblue"
      clicks =0;
    }
    const button=document.getElementById("switching");
    const screen=document.getElementById("cliking");
    screen.textContent=cliking ;}
    
    
  </script>
